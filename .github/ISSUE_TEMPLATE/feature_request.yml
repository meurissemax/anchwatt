name: Feature request
description: Suggest an idea for Anchwatt
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What do you want Anchwatt to do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      description: What's the use case or the problem this solves? (Even "it would be funny" is a valid answer.)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Anything else you thought about?
    validations:
      required: false
