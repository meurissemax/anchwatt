name: Bug report
description: Report something that's not working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Anchwatt
        2. Lock the screen
        3. ...
    validations:
      required: true

  - type: input
    id: anchwatt-version
    attributes:
      label: Anchwatt version
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. 14.5 Sonoma"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or anything else
      description: Paste relevant logs or drop screenshots here.
    validations:
      required: false
